function parseTime(t) {
  if (!t || t === "") return -1;
  var parts = t.replace(".",":").split(":");
  if (parts.length < 2) return -1;
  var h = parseInt(parts[0],10);
  var m = parseInt(parts[1],10);
  if (isNaN(h)||isNaN(m)) return -1;
  return h*60+m;
}

  if (meal==="aamiainen") return parseTime(s.aamiainenStart)>=0 && parseTime(s.aamiainenEnd)>=0;

  return false;
}

  if (hasMeal(s,"paivallinen") && tm >= paiStart && tm <= paiEnd) {
    var e2 = MENU_DATA.find(function(x){return x.date===toDS(now) && x.meal==="paivallinen"});
    if (e2) return { mealLabel:"P\u00c4IV\u00c4LLINEN", dateLabel:fmtDateShort(now),
      rowsFi:e2.rowsFi, rowsEn:e2.rowsEn,
      servingLabel:s.paivallinenStart+"\u2013"+s.paivallinenEnd, status:"live", isAamiainen:false };
  }

  // 4. Next upcoming meal today
  if (hasMeal(s,"aamiainen") && tm < aamStart) {
    return { mealLabel:"AAMIAINEN", dateLabel:fmtDateShort(now), rowsFi:[], rowsEn:[],
      servingLabel:s.aamiainenStart+"\u2013"+s.aamiainenEnd, status:"next", isAamiainen:true };
  }
  if (hasMeal(s,"lounas") && tm < louStart) {
    var e3 = MENU_DATA.find(function(x){return x.date===toDS(now) && x.meal==="lounas"});
    if (e3) return { mealLabel:"LOUNAS", dateLabel:fmtDateShort(now),
      rowsFi:e3.rowsFi, rowsEn:e3.rowsEn,
      servingLabel:s.lounasStart+"\u2013"+s.lounasEnd, status:"next", isAamiainen:false };
  }
  if (hasMeal(s,"paivallinen") && tm < paiStart) {
    var e4 = MENU_DATA.find(function(x){return x.date===toDS(now) && x.meal==="paivallinen"});
    if (e4) return { mealLabel:"P\u00c4IV\u00c4LLINEN", dateLabel:fmtDateShort(now),
      rowsFi:e4.rowsFi, rowsEn:e4.rowsEn,
      servingLabel:s.paivallinenStart+"\u2013"+s.paivallinenEnd, status:"next", isAamiainen:false };
  }

  // 5. Tomorrow's lounas preview
  var tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate()+1);
  var ts = SETTINGS[String(tomorrow.getDay())] || defaultTimes;
  if (hasMeal(ts,"lounas")) {
    var e5 = MENU_DATA.find(function(x){return x.date===toDS(tomorrow) && x.meal==="lounas"});
    if (e5) return { mealLabel:"LOUNAS", dateLabel:fmtDateShort(tomorrow),
      rowsFi:e5.rowsFi, rowsEn:e5.rowsEn,
      servingLabel:ts.lounasStart+"\u2013"+ts.lounasEnd, status:"preview", isAamiainen:false };
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  var m = getMenu();
  var labelEl = document.getElementById('mealLabel');
  var timeBar = document.getElementById('timeBar');
  var menuRows = document.getElementById('menuRows');

  if (!m) {
    labelEl.textContent = '';
    timeBar.innerHTML = '';
    menuRows.innerHTML = '<div class="no-menu">Ruokalistaa ei ole saatavilla.</div>';
    return;
  }

  labelEl.textContent = m.mealLabel;

  // Time bar: serving time, status indicator, date
  var tbHTML = '<span>'+m.servingLabel+'</span>';
  if (m.status === 'live') {
    tbHTML += '<span class="live-dot"></span><span>Nyt tarjolla</span>';
    tbHTML += '<span class="live-dot"></span><span style="color:#66A5DA">Now serving</span>';
  } else if (m.status === 'preview') {
    tbHTML += '<span class="huomenna">Huomenna</span>';
    tbHTML += '<span class="huomenna" style="color:#66A5DA">Tomorrow</span>';
  }
  tbHTML += '<span class="menu-date">'+m.dateLabel+'</span>';
  timeBar.innerHTML = tbHTML;

  // Menu rows (empty for aamiainen or if no content)
  if (m.isAamiainen || !m.rowsFi || m.rowsFi.length === 0) {
    menuRows.innerHTML = '';
    return;
  }
  var rh = '';
  for (var i = 0; i < m.rowsFi.length; i++) {
    var fi = (m.rowsFi[i] || '').trim();
    if (!fi) continue;
    var en = ((m.rowsEn[i] || '') + '').trim();
    rh += '<div class="menu-item">' +
          '<span class="bullet-fi">&bull;</span>' +
          '<span class="fi">'+fi+'</span>';
    if (en) {
      rh += '<span class="bullet-en">&bull;</span>' +
            '<span class="en">'+en+'</span>';
    }
    rh += '</div>';
  }
  menuRows.innerHTML = rh;
  applyMenuLayouts();
}

// ═══════════════════════════════════════════════════════════════
// DYNAMIC MENU LAYOUT (inline → stacked fallback, max font scaling)
// ═══════════════════════════════════════════════════════════════
function applyMenuLayouts() {
  var items = Array.from(document.querySelectorAll('.menu-item'));
  if (items.length === 0) return;
  var root = document.documentElement;
  var menuRows = document.getElementById('menuRows');

  function alignInline() {
    var inline = Array.from(document.querySelectorAll('.menu-item.layout-inline'));
    inline.forEach(function(i){
      var fi = i.querySelector('.fi');
      if (fi) fi.style.minWidth = '';
    });
    if (inline.length > 1) {
      var max = 0;
      inline.forEach(function(i){
        var fi = i.querySelector('.fi');
        if (fi && fi.scrollWidth > max) max = fi.scrollWidth;
      });
      inline.forEach(function(i){
        var fi = i.querySelector('.fi');
        if (fi) fi.style.minWidth = max + 'px';
      });
    }
  }
  function fits() {
    var inline = document.querySelectorAll('.menu-item.layout-inline');
    for (var i = 0; i < inline.length; i++) {
      if (inline[i].scrollWidth > inline[i].clientWidth + 1) return false;
    }
    if (menuRows.scrollHeight > menuRows.clientHeight + 1) return false;
    return true;
  }

  root.style.setProperty('--menu-scale', 1);
  items.forEach(function(i){
    i.classList.remove('layout-stacked');
    i.classList.add('layout-inline');
    var fi = i.querySelector('.fi');
    if (fi) fi.style.minWidth = '';
  });

  // If ANY item overflows at minimum size → switch ALL to stacked
  var anyOverflow = false;
  for (var j = 0; j < items.length; j++) {
    if (items[j].scrollWidth > items[j].clientWidth + 1) {
      anyOverflow = true;
      break;
    }
  }
  if (anyOverflow) {
    items.forEach(function(i){
      i.classList.remove('layout-inline');
      i.classList.add('layout-stacked');
    });
  }

  alignInline();

  // Re-check after alignment — if any inline item now overflows, switch ALL to stacked
  var inlineNow = document.querySelectorAll('.menu-item.layout-inline');
  var overflowAfterAlign = false;
  inlineNow.forEach(function(i){
    if (i.scrollWidth > i.clientWidth + 1) overflowAfterAlign = true;
  });
  if (overflowAfterAlign) {
    items.forEach(function(i){
      i.classList.remove('layout-inline');
      i.classList.add('layout-stacked');
      var fi = i.querySelector('.fi');
      if (fi) fi.style.minWidth = '';
    });
  }
  alignInline();

  var lo = 1.0, hi = 2.0, best = 1.0;
  for (var iter = 0; iter < 12; iter++) {
    var mid = (lo + hi) / 2;
    root.style.setProperty('--menu-scale', mid);
    alignInline();
    if (fits()) { best = mid; lo = mid; } else { hi = mid; }
  }
  root.style.setProperty('--menu-scale', best);
  alignInline();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
render();
setInterval(render, 60000);
window.addEventListener('resize', render);
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(render);
}
</script>
