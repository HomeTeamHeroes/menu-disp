<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pajulahti · Interaktiivinen aluekartta</title>
<meta name="description" content="Tervetuloa yhdenvertaiseen Pajulahteen. Tutustu alueeseen interaktiivisen kartan kautta." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:            #f3ede0;
    --bg-paper:      #faf6ec;
    --ink:           #121a17;
    --ink-soft:      #2d3832;
    --muted:         #6c7a72;
    --line:          #dcd3bf;

    --forest:        #1f3a2e;
    --forest-deep:   #132a20;
    --forest-soft:   #3a5d4b;
    --moss:          #7fa07a;

    --plum:          #5b3a6f;
    --plum-deep:     #3e2650;
    --plum-soft:     #8d6ca2;

    --sand:          #d9c69a;
    --sand-soft:     #ecddb6;
    --water:         #a4d4de;
    --sun:           #e9a84a;

    --cat-lodging:   #2496aa;
    --cat-building:  #1a1815;
    --cat-activity:  #f5eed8;

    --shadow-sm: 0 2px 6px rgba(19,42,32,.08), 0 1px 2px rgba(19,42,32,.05);
    --shadow-md: 0 8px 24px rgba(19,42,32,.12), 0 2px 6px rgba(19,42,32,.06);
    --shadow-lg: 0 30px 60px -15px rgba(19,42,32,.35), 0 10px 20px -5px rgba(19,42,32,.12);

    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 22px;

    --font-display: "Fraunces", "Georgia", serif;
    --font-body:    "Manrope", system-ui, -apple-system, sans-serif;

    --ease-out: cubic-bezier(.2,.8,.2,1);
    --ease-smooth: cubic-bezier(.4,0,.2,1);
  }

  *, *::before, *::after { box-sizing:border-box; }

  html, body { margin:0; padding:0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01","cv11";
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 1100px 500px at 10% 0%, rgba(127,160,122,.22), transparent 65%),
      radial-gradient(ellipse 900px 500px at 95% 100%, rgba(164,212,222,.25), transparent 65%),
      radial-gradient(ellipse 700px 400px at 50% 60%, rgba(91,58,111,.06), transparent 70%);
  }

  /* Subtle paper grain overlay */
  body::before {
    content:"";
    position: fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(rgba(19,42,32,.04) 1px, transparent 1px);
    background-size: 4px 4px;
    mix-blend-mode: multiply;
    opacity: .5;
  }

  /* ----------- Header ----------- */
  .site-header{
    position: relative; z-index: 2;
    padding: 28px 40px 16px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 24px;
    align-items: end;
  }
  .brand{
    display: flex; align-items: center; gap: 14px;
  }
  .brand-logo{
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--forest);
    color: var(--bg-paper);
    display: grid; place-items: center;
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 500;
    font-size: 26px;
    letter-spacing: -0.03em;
    box-shadow: inset 0 -2px 0 rgba(0,0,0,.25);
  }
  .brand-text{
    line-height: 1;
  }
  .brand-name{
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 28px;
    letter-spacing: -0.035em;
    color: var(--forest-deep);
  }
  .brand-tag{
    font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--muted); margin-top: 6px; font-weight: 600;
  }

  .hero-title{
    justify-self: center;
    text-align: center;
    padding-bottom: 4px;
  }
  .hero-title .kicker{
    font-size: 11px;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--plum);
    font-weight: 700;
  }
  .hero-title h1{
    margin: 6px 0 0;
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(24px, 2.4vw, 34px);
    letter-spacing: -0.025em;
    line-height: 1.05;
    color: var(--forest-deep);
  }
  .hero-title h1 em {
    font-style: italic;
    color: var(--plum);
  }

  .header-meta{
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    font-size: 12px; color: var(--muted);
  }
  .header-meta .badges {
    display:flex; gap:8px;
  }
  .badge{
    display: inline-flex; align-items:center; gap: 6px;
    padding: 5px 10px 5px 8px;
    border-radius: 999px;
    background: var(--bg-paper);
    border: 1px solid var(--line);
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-soft);
    letter-spacing: .02em;
  }
  .badge svg{ width:12px; height:12px; }
  .badge.oly svg { color: #0075c9; }
  .badge.para svg { color: #00a79d; }

  /* ----------- Layout ----------- */
  .layout{
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 380px;
    gap: 28px;
    padding: 14px 40px 40px;
    align-items: start;
  }

  /* ----------- Map panel ----------- */
  .map-panel{
    position: relative;
    background: var(--bg-paper);
    border-radius: var(--radius-lg);
    padding: 18px;
    box-shadow: var(--shadow-md);
    border: 1px solid rgba(19,42,32,.06);
  }

  .map-toolbar{
    display:flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 0 6px 14px;
    flex-wrap: wrap;
  }
  .filter-chips{
    display: inline-flex; gap: 6px;
    background: rgba(19,42,32,.05);
    padding: 5px;
    border-radius: 999px;
  }
  .chip{
    border: none; background: transparent;
    padding: 8px 16px;
    border-radius: 999px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 7px;
    transition: background .2s var(--ease-out), color .2s, transform .15s;
  }
  .chip:hover { color: var(--forest-deep); }
  .chip .dot{
    width: 9px; height: 9px; border-radius: 50%;
    background: currentColor; opacity: .55;
  }
  .chip.active{
    background: var(--forest-deep);
    color: #fff;
  }
  .chip.active .dot{ opacity:1; }
  .chip[data-cat="lodging"]   .dot { color: var(--cat-lodging); }
  .chip[data-cat="building"]  .dot { color: var(--cat-building); }
  .chip[data-cat="activity"]  .dot { color: #a58a4b; }

  .map-info{
    font-size: 12px;
    color: var(--muted);
    display:flex; align-items:center; gap:8px;
  }
  .map-info kbd{
    font-family: var(--font-body);
    display:inline-block;
    padding: 2px 7px;
    border: 1px solid var(--line);
    background: var(--bg);
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-soft);
    box-shadow: 0 1px 0 var(--line);
  }

  .map-wrap{
    position: relative;
    border-radius: var(--radius-md);
    overflow: hidden;
    background: #bfd4a8; /* approximates grass color for tiny flashes during load */
    aspect-ratio: 1430 / 1654;
    max-height: calc(100vh - 220px);
  }
  @media (max-height: 900px) {
    .map-wrap { max-height: 780px; }
  }
  .map-img{
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    display: block;
  }

  /* Markers */
  .marker{
    position: absolute;
    transform: translate(-50%, -50%);
    width: clamp(26px, 2.5vw, 34px);
    height: clamp(26px, 2.5vw, 34px);
    border-radius: 50%;
    border: 0;
    cursor: pointer;
    padding: 0;
    display: grid; place-items: center;
    font-family: var(--font-body);
    font-weight: 800;
    font-size: clamp(10px, 1.05vw, 13px);
    letter-spacing: -0.02em;
    color: #fff;
    background: rgba(0,0,0,0);
    outline-offset: 4px;
    transition: transform .25s var(--ease-out);
    z-index: 5;
  }
  .marker::before{
    content: "";
    position: absolute; inset: 0;
    border-radius: 50%;
    transition: box-shadow .25s, transform .25s var(--ease-out);
    z-index: -1;
  }
  .marker::after{
    /* outer halo for emphasis on hover/active */
    content: "";
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: inset .3s var(--ease-out), border-color .25s;
    z-index: -2;
  }
  .marker:focus-visible{ outline: 3px solid var(--sun); outline-offset: 5px; }

  /* Lodging markers: solid cyan */
  .marker[data-cat="lodging"]::before{
    background: var(--cat-lodging);
    box-shadow: 0 2px 5px rgba(19,42,32,.35), inset 0 -2px 0 rgba(0,0,0,.2);
  }
  /* Building markers: deep near-black */
  .marker[data-cat="building"]::before{
    background: var(--cat-building);
    box-shadow: 0 2px 5px rgba(19,42,32,.4), inset 0 -2px 0 rgba(255,255,255,.1);
  }
  /* Activity markers: white with outline */
  .marker[data-cat="activity"]{
    color: var(--cat-building);
  }
  .marker[data-cat="activity"]::before{
    background: var(--cat-activity);
    box-shadow: 0 2px 5px rgba(19,42,32,.3), inset 0 -2px 0 rgba(0,0,0,.08), 0 0 0 1.5px rgba(26,24,21,.35);
  }

  .marker:hover{ transform: translate(-50%, -50%) scale(1.25); z-index: 8; }
  .marker:hover::before{
    box-shadow:
      0 8px 18px rgba(19,42,32,.25),
      inset 0 -2px 0 rgba(0,0,0,.25),
      0 0 0 3px #fff;
  }
  .marker:hover::after{
    inset: -14px;
    border-color: rgba(255,255,255,.65);
  }
  .marker.is-active{ transform: translate(-50%, -50%) scale(1.35); z-index: 9; }
  .marker.is-active::before{
    box-shadow:
      0 10px 22px rgba(19,42,32,.35),
      inset 0 -2px 0 rgba(0,0,0,.25),
      0 0 0 3px var(--sun);
  }

  .marker.is-hidden{
    opacity: .18;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(.75);
  }

  /* Marker pulse (only on selected) */
  @keyframes pulse-ring {
    0%   { transform: translate(-50%, -50%) scale(1);    opacity: .7; }
    100% { transform: translate(-50%, -50%) scale(2.2);  opacity: 0; }
  }
  .marker.is-active::after{
    content: "";
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 2px solid var(--sun);
    animation: pulse-ring 1.6s var(--ease-out) infinite;
  }

  /* Tooltip on hover */
  .tooltip{
    position: absolute;
    transform: translate(-50%, calc(-100% - 14px));
    background: var(--ink);
    color: #fff;
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 12.5px;
    font-weight: 600;
    white-space: nowrap;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity .18s var(--ease-out);
    box-shadow: var(--shadow-md);
  }
  .tooltip::after{
    content: "";
    position: absolute;
    bottom: -5px; left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 10px; height: 10px;
    background: var(--ink);
    border-radius: 2px;
  }
  .tooltip.is-visible{ opacity: 1; }

  /* ----------- Sidebar ----------- */
  .sidebar{
    background: var(--bg-paper);
    border-radius: var(--radius-lg);
    padding: 22px 22px 14px;
    box-shadow: var(--shadow-md);
    border: 1px solid rgba(19,42,32,.06);
    max-height: calc(100vh - 120px);
    display: flex; flex-direction: column;
    position: sticky; top: 18px;
  }

  .sidebar h2{
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 22px;
    letter-spacing: -0.02em;
    margin: 0 0 14px;
    color: var(--forest-deep);
  }
  .sidebar h2 em { font-style: italic; color: var(--plum); }

  .search-field{
    position: relative;
    margin-bottom: 18px;
  }
  .search-field input{
    width: 100%;
    font-family: var(--font-body);
    font-size: 14px;
    padding: 11px 12px 11px 38px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: var(--bg);
    color: var(--ink);
    transition: border-color .2s, box-shadow .2s;
  }
  .search-field input:focus{
    outline: none;
    border-color: var(--forest-soft);
    box-shadow: 0 0 0 3px rgba(58,93,75,.15);
  }
  .search-field svg{
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--muted);
  }

  .loc-list{
    overflow-y: auto;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--sand) transparent;
    margin: 0 -6px;
  }
  .loc-list::-webkit-scrollbar { width: 8px; }
  .loc-list::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 4px; }

  .section-header{
    display: flex; align-items: center; gap: 10px;
    padding: 16px 8px 8px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .18em;
    color: var(--muted);
    position: sticky;
    top: 0;
    background: linear-gradient(180deg, var(--bg-paper) 65%, rgba(250,246,236,0));
    backdrop-filter: blur(2px);
    z-index: 1;
  }
  .section-header .rule{
    flex: 1; height: 1px; background: var(--line);
  }

  .loc-list ul{ list-style: none; padding: 0; margin: 0; }
  .loc-item{
    display: grid;
    grid-template-columns: 34px 1fr auto;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 9px 10px;
    border-radius: 10px;
    border: 0;
    background: transparent;
    color: inherit;
    font-family: var(--font-body);
    text-align: left;
    cursor: pointer;
    transition: background .15s, transform .15s;
  }
  .loc-item:hover{
    background: rgba(19,42,32,.05);
  }
  .loc-item:focus-visible{
    outline: 2px solid var(--forest-soft);
    outline-offset: -2px;
  }
  .loc-item .num{
    width: 30px; height: 30px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 12px;
    font-weight: 800;
    color: #fff;
    background: var(--cat-building);
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .loc-item[data-cat="lodging"] .num  { background: var(--cat-lodging); }
  .loc-item[data-cat="building"] .num { background: var(--cat-building); }
  .loc-item[data-cat="activity"] .num {
    background: var(--cat-activity);
    color: var(--ink);
    box-shadow: inset 0 0 0 1.5px rgba(26,24,21,.3);
  }
  .loc-item .name{
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.25;
  }
  .loc-item .subline{
    display: block;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--muted);
    margin-top: 2px;
  }
  .loc-item .arrow{
    width: 16px; height: 16px;
    color: var(--muted);
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity .15s, transform .2s var(--ease-out);
  }
  .loc-item:hover .arrow{
    opacity: 1; transform: translateX(0);
  }
  .loc-item.is-hidden{ display: none; }

  .no-results{
    padding: 18px; text-align: center;
    color: var(--muted); font-size: 13px;
    display: none;
  }
  .no-results.is-visible{ display: block; }

  /* Sidebar footer */
  .sidebar-footer{
    padding-top: 14px;
    margin-top: auto;
    border-top: 1px solid var(--line);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .sidebar-footer .count{
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 18px;
    color: var(--forest-deep);
    letter-spacing: -0.02em;
  }

  /* ----------- Modal ----------- */
  .modal-overlay{
    position: fixed; inset: 0;
    background: rgba(18,26,23,.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: grid; place-items: center;
    padding: 24px;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s var(--ease-out);
  }
  .modal-overlay.is-open{ opacity: 1; pointer-events: auto; }

  .modal{
    position: relative;
    width: min(760px, 100%);
    max-height: 90vh;
    background: var(--bg-paper);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transform: translateY(18px) scale(.97);
    transition: transform .35s var(--ease-out);
  }
  .modal-overlay.is-open .modal{
    transform: translateY(0) scale(1);
  }

  .modal-image{
    position: relative;
    aspect-ratio: 16 / 9;
    background: var(--moss);
    overflow: hidden;
  }
  .modal-image img{
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 1s var(--ease-out);
  }
  .modal-overlay.is-open .modal-image img{
    transform: scale(1.03);
  }
  .modal-image::after{
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 45%, rgba(18,26,23,.55));
  }

  .modal-top{
    position: absolute; inset: 20px 20px auto;
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px;
    z-index: 2;
  }

  .modal-pill{
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px 6px 10px;
    border-radius: 999px;
    background: rgba(250,246,236,.95);
    color: var(--ink-soft);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    box-shadow: var(--shadow-sm);
  }
  .modal-pill .pill-dot{
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cat-building);
  }
  .modal-pill[data-cat="lodging"] .pill-dot { background: var(--cat-lodging); }
  .modal-pill[data-cat="activity"] .pill-dot { background: #a58a4b; }

  .modal-close{
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 0;
    background: rgba(250,246,236,.95);
    color: var(--ink);
    cursor: pointer;
    display: grid; place-items: center;
    box-shadow: var(--shadow-sm);
    transition: transform .15s, background .15s;
  }
  .modal-close:hover{ transform: scale(1.08); background: #fff; }
  .modal-close svg{ width: 16px; height: 16px; }

  .modal-number-badge{
    position: absolute;
    left: 24px; bottom: 20px;
    display: inline-flex; align-items: baseline; gap: 10px;
    color: #fff;
    z-index: 2;
  }
  .modal-number-badge .num{
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 300;
    font-size: 68px;
    line-height: 1;
    letter-spacing: -0.05em;
    text-shadow: 0 4px 16px rgba(0,0,0,.4);
  }
  .modal-number-badge .label{
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .24em;
    text-transform: uppercase;
    opacity: .8;
    padding-bottom: 8px;
  }

  .modal-body{
    padding: 24px 28px 20px;
    overflow-y: auto;
  }
  .modal-title{
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 32px;
    line-height: 1.1;
    letter-spacing: -0.025em;
    margin: 0 0 6px;
    color: var(--forest-deep);
  }
  .modal-subtitle{
    font-size: 13px;
    font-weight: 600;
    color: var(--plum);
    letter-spacing: .04em;
    margin-bottom: 14px;
  }
  .modal-description{
    font-size: 15px;
    line-height: 1.65;
    color: var(--ink-soft);
    margin: 0 0 18px;
  }
  .modal-meta{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    padding: 14px;
    background: var(--bg);
    border-radius: var(--radius-md);
    border: 1px solid var(--line);
  }
  .modal-meta .meta{
    font-size: 12px;
    line-height: 1.4;
  }
  .modal-meta .meta-label{
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .14em;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 3px;
  }
  .modal-meta .meta-value{
    font-weight: 600;
    color: var(--ink);
  }

  .modal-footer{
    padding: 14px 28px 22px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    border-top: 1px solid var(--line);
  }
  .btn{
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13px;
    border-radius: 999px;
    border: 0;
    cursor: pointer;
    transition: transform .15s, background .15s, box-shadow .15s;
  }
  .btn-primary{
    background: var(--forest-deep);
    color: #fff;
  }
  .btn-primary:hover{ transform: translateY(-1px); box-shadow: var(--shadow-md); background: var(--forest); }
  .btn-ghost{
    background: transparent;
    color: var(--ink-soft);
  }
  .btn-ghost:hover{ background: rgba(19,42,32,.06); }

  /* ----------- Responsive ----------- */
  @media (max-width: 1024px) {
    .layout{
      grid-template-columns: 1fr;
      padding: 14px 20px 40px;
    }
    .sidebar{
      position: static;
      max-height: 440px;
    }
    .site-header{
      padding: 20px 20px 10px;
      grid-template-columns: 1fr auto;
    }
    .hero-title{ display: none; }
  }

  @media (max-width: 640px) {
    .site-header{
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .header-meta{ align-items: flex-start; }
    .map-panel{ padding: 10px; }
    .modal{ max-height: 95vh; }
    .modal-title{ font-size: 26px; }
    .modal-body{ padding: 20px; }
    .modal-number-badge .num{ font-size: 50px; }
    .modal-footer{ padding: 14px 20px 20px; }
  }

  /* Loading skeleton for modal image */
  .img-skel{
    position: absolute; inset:0;
    background: linear-gradient(100deg, #c4d3ae 0%, #d7deb8 50%, #c4d3ae 100%);
    background-size: 200% 100%;
    animation: skel 1.2s linear infinite;
  }
  @keyframes skel { to { background-position: -200% 0; } }

  /* Accessibility: reduce motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .01ms !important;
    }
  }
</style>
</head>

/* ============================================================
   MARKER RENDERING
============================================================ */
function renderMarkers(){
  LOCATIONS.forEach((loc, idx) => {
    const btn = document.createElement("button");
    btn.className = "marker";
    btn.dataset.id = loc.id;
    btn.dataset.cat = loc.cat;
    btn.style.left = loc.x + "%";
    btn.style.top  = loc.y + "%";
    btn.textContent = loc.id;
    btn.setAttribute("aria-label", loc.id + ": " + loc.name);
    btn.addEventListener("click", (e) => { e.stopPropagation(); openModal(idx); });
    btn.addEventListener("mouseenter", (e) => showTooltip(btn, loc));
    btn.addEventListener("mouseleave", hideTooltip);
    btn.addEventListener("focus", (e) => showTooltip(btn, loc));
    btn.addEventListener("blur", hideTooltip);
    mapWrap.appendChild(btn);
  });
}

function showTooltip(btn, loc){
  tooltip.textContent = loc.id + "  ·  " + loc.name;
  tooltip.style.left = btn.style.left;
  tooltip.style.top  = btn.style.top;
  tooltip.classList.add("is-visible");
  tooltip.setAttribute("aria-hidden","false");
}
function hideTooltip(){
  tooltip.classList.remove("is-visible");
  tooltip.setAttribute("aria-hidden","true");
}

/* ============================================================
   LIST RENDERING
============================================================ */
function renderList(){
  listEl.innerHTML = "";
  const sections = {};
  LOCATIONS.forEach((loc, idx) => {
    (sections[loc.section] = sections[loc.section] || []).push({loc, idx});
  });
  SECTION_ORDER.forEach(sec => {
    if (!sections[sec]) return;
    const h = document.createElement("div");
    h.className = "section-header";
    h.innerHTML = `<span>${sec}</span><span class="rule"></span><span>${sections[sec].length}</span>`;
    listEl.appendChild(h);
    const ul = document.createElement("ul");
    sections[sec].forEach(({loc, idx}) => {
      const li = document.createElement("li");
      const btn = document.createElement("button");
      btn.className = "loc-item";
      btn.dataset.cat = loc.cat;
      btn.dataset.id = loc.id;
      btn.type = "button";
      btn.innerHTML = `
        <span class="num">${loc.id}</span>
        <span>
          <span class="name">${loc.name}</span>
          ${loc.subtitle ? `<span class="subline">${loc.subtitle}</span>` : (loc.rooms ? `<span class="subline">Huoneet ${loc.rooms}</span>` : "")}
        </span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      `;
      btn.addEventListener("click", () => openModal(idx));
      btn.addEventListener("mouseenter", () => highlightMarker(loc.id, true));
      btn.addEventListener("mouseleave", () => highlightMarker(loc.id, false));
      li.appendChild(btn);
      ul.appendChild(li);
    });
    listEl.appendChild(ul);
  });
  updateCounts();
}

function highlightMarker(id, on){
  const m = mapWrap.querySelector(`.marker[data-id="${CSS.escape(id)}"]`);
  if (!m) return;
  m.style.transform = on
    ? "translate(-50%, -50%) scale(1.3)"
    : "";
  m.style.zIndex = on ? 8 : "";
}

/* ============================================================
   FILTER & SEARCH
============================================================ */
function applyFilters(){
  const q = state.query.trim().toLowerCase();
  let shown = 0;
  LOCATIONS.forEach(loc => {
    const catMatch = state.activeCategory === "all" || loc.cat === state.activeCategory;
    const qMatch = !q
      || loc.id.toLowerCase().includes(q)
      || loc.name.toLowerCase().includes(q)
      || (loc.subtitle || "").toLowerCase().includes(q)
      || (loc.rooms || "").toLowerCase().includes(q)
      || (loc.desc || "").toLowerCase().includes(q);
    const visible = catMatch && qMatch;
    const marker = mapWrap.querySelector(`.marker[data-id="${CSS.escape(loc.id)}"]`);
    const listItem = listEl.querySelector(`.loc-item[data-id="${CSS.escape(loc.id)}"]`);
    if (marker) marker.classList.toggle("is-hidden", !visible);
    if (listItem) listItem.classList.toggle("is-hidden", !visible);
    if (visible) shown++;
  });

  // Hide section headers when no items remain visible in the section
  listEl.querySelectorAll(".section-header").forEach(h => {
    const next = h.nextElementSibling;
    if (next && next.tagName === "UL") {
      const anyVisible = Array.from(next.children).some(li =>
        !li.firstElementChild.classList.contains("is-hidden")
      );
      h.style.display = anyVisible ? "" : "none";
    }
  });

  noResults.classList.toggle("is-visible", shown === 0);
  visibleCt.textContent = shown;
}

function updateCounts(){
  totalCt.textContent = LOCATIONS.length;
  visibleCt.textContent = LOCATIONS.length;
}

chipsEl.addEventListener("click", (e) => {
  const chip = e.target.closest(".chip");
  if (!chip) return;
  chipsEl.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  chip.classList.add("active");
  state.activeCategory = chip.dataset.cat;
  applyFilters();
});

searchEl.addEventListener("input", (e) => {
  state.query = e.target.value;
  applyFilters();
});

/* ============================================================
   MODAL
============================================================ */
function getVisibleIndices(){
  const q = state.query.trim().toLowerCase();
  return LOCATIONS
    .map((loc, idx) => ({loc, idx}))
    .filter(({loc}) => {
      const catMatch = state.activeCategory === "all" || loc.cat === state.activeCategory;
      const qMatch = !q
        || loc.id.toLowerCase().includes(q)
        || loc.name.toLowerCase().includes(q)
        || (loc.subtitle || "").toLowerCase().includes(q)
        || (loc.rooms || "").toLowerCase().includes(q)
        || (loc.desc || "").toLowerCase().includes(q);
      return catMatch && qMatch;
    })
    .map(({idx}) => idx);
}

function buildPhotoUrl(loc){
  // Picsum with deterministic seed derived from id + name — stable nice photos
  const seed = encodeURIComponent("pajulahti-" + loc.id + "-" + loc.name.replace(/\s+/g,'-').toLowerCase());
  return `https://picsum.photos/seed/${seed}/960/540`;
}

function openModal(idx){
  state.lastFocused = document.activeElement;
  state.currentIndex = idx;
  populateModal(LOCATIONS[idx]);
  overlay.classList.add("is-open");
  overlay.setAttribute("aria-hidden","false");
  document.body.style.overflow = "hidden";
  // mark active marker
  mapWrap.querySelectorAll(".marker.is-active").forEach(m => m.classList.remove("is-active"));
  const marker = mapWrap.querySelector(`.marker[data-id="${CSS.escape(LOCATIONS[idx].id)}"]`);
  if (marker) marker.classList.add("is-active");
  setTimeout(() => modalClose.focus(), 80);
}

function populateModal(loc){
  modalPill.dataset.cat = loc.cat;
  modalPillT.textContent = CATEGORY_LABELS[loc.cat] || "Kohde";
  modalNum.textContent = loc.id;
  modalNumL.textContent = loc.section;
  modalTitle.textContent = loc.name;
  modalSub.textContent  = loc.subtitle || (loc.rooms ? "Huoneet: " + loc.rooms : loc.section);
  modalDesc.textContent = loc.desc;

  // meta
  modalMeta.innerHTML = "";
  if (loc.meta) {
    Object.entries(loc.meta).forEach(([k,v]) => {
      const el = document.createElement("div");
      el.className = "meta";
      el.innerHTML = `<span class="meta-label">${k}</span><span class="meta-value">${v}</span>`;
      modalMeta.appendChild(el);
    });
  }

  // image: show skeleton until loaded
  modalSkel.style.display = "block";
  modalImg.style.opacity = "0";
  modalImg.onload = () => {
    modalSkel.style.display = "none";
    modalImg.style.opacity = "1";
    modalImg.style.transition = "opacity .4s ease";
  };
  modalImg.onerror = () => {
    modalSkel.style.display = "none";
    modalImg.style.opacity = "1";
  };
  modalImg.src = buildPhotoUrl(loc);
  modalImg.alt = loc.name + " – esimerkkikuva";
}

function closeModal(){
  overlay.classList.remove("is-open");
  overlay.setAttribute("aria-hidden","true");
  document.body.style.overflow = "";
  mapWrap.querySelectorAll(".marker.is-active").forEach(m => m.classList.remove("is-active"));
  if (state.lastFocused && typeof state.lastFocused.focus === "function") {
    state.lastFocused.focus();
  }
}

function navigate(dir){
  const visible = getVisibleIndices();
  if (visible.length === 0) return;
  const pos = visible.indexOf(state.currentIndex);
  let nextPos = (pos === -1 ? 0 : pos + dir);
  if (nextPos < 0) nextPos = visible.length - 1;
  if (nextPos >= visible.length) nextPos = 0;
  openModal(visible[nextPos]);
}

modalClose.addEventListener("click", closeModal);
modalPrev.addEventListener("click", () => navigate(-1));
modalNext.addEventListener("click", () => navigate(1));

overlay.addEventListener("click", (e) => {
  if (e.target === overlay) closeModal();
});

document.addEventListener("keydown", (e) => {
  if (!overlay.classList.contains("is-open")) return;
  if (e.key === "Escape") closeModal();
  if (e.key === "ArrowRight") navigate(1);
  if (e.key === "ArrowLeft") navigate(-1);
});

/* ============================================================
   INIT
============================================================ */
renderMarkers();
renderList();
applyFilters();
</script>

</body>
</html>
