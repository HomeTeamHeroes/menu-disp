<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=DM+Serif+Display&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-panel:rgba(0,0,0,0.65);
  --text-primary:#FFFFFF;
  --text-secondary:rgba(255,255,255,0.7);
  --accent:#D4A853;
  --accent-dim:rgba(212,168,83,0.3);
  --divider:rgba(255,255,255,0.12);
}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:'DM Sans',sans-serif;color:var(--text-primary)}
.container{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:3% 5%}
.menu-panel{background:var(--bg-panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:16px;padding:5% 7%;width:100%;max-width:800px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.menu-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6%;padding-bottom:4%;border-bottom:2px solid var(--accent-dim)}
.meal-type{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,42px);letter-spacing:0.08em;color:var(--accent)}
.menu-date{font-size:clamp(11px,1.6vw,18px);font-weight:300;color:var(--text-secondary);text-transform:capitalize}
.menu-rows{display:flex;flex-direction:column;gap:clamp(8px,2.2vh,20px)}
.menu-row{font-size:clamp(14px,2.4vw,28px);font-weight:500;line-height:1.35;padding-left:4%;position:relative;letter-spacing:0.01em}
.menu-row::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:5px;height:5px;background:var(--accent);border-radius:50%}
.time-indicator{margin-top:6%;padding-top:4%;border-top:1px solid var(--divider);display:flex;justify-content:space-between;align-items:center;font-size:clamp(9px,1.3vw,14px);color:var(--text-secondary);font-weight:300}
.serving-time{display:flex;align-items:center;gap:6px}
.serving-time .dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;animation:pulse 2s ease-in-out infinite}
.preview-badge{font-style:italic;color:var(--accent);opacity:0.8}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.no-menu{text-align:center;padding:10% 5%;color:var(--text-secondary);font-size:clamp(14px,2vw,22px);font-weight:300;font-style:italic}
.fade-in{animation:fadeIn 0.8s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">
  <div class="menu-panel fade-in" id="menuPanel"></div>
</div>
<script>
// Power Automate replaces the placeholder below with actual JSON data
const MENU_DATA = [{"date":"2026-04-14","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Sapuskaa Ruokaa"]},{"date":"2026-04-14","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Jälkiruokaa"]},{"date":"2026-04-15","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa Lisää","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Sapuskaa Ruokaa"]},{"date":"2026-04-15","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Ruokaa Sapuskaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Lisää jälkkäriä!"]},{"date":"2026-04-16","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa",""]},{"date":"2026-04-16","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa Torstai","Sapuskaa Ruokaa","TorstaiJälkkäri"]},{"date":"2026-04-17","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa Perjantai","Sapuskaa Ruokaa",""]},{"date":"2026-04-17","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Sapuskaa Ruokaa"]},{"date":"2026-04-18","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa Lauantai","Sapuskaa Ruokaa",""]},{"date":"2026-04-18","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Sapuskaa Ruokaa"]},{"date":"2026-04-19","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Kermavaahto"]},{"date":"2026-04-19","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Jälkkärii"]},{"date":"2026-04-20","meal":"lounas","rows":["Maanantain","ruokaa","Ruokaaaaaa","okok","Hyvää Ruokaa"]},{"date":"2026-04-20","meal":"paivallinen","rows":["okok","Ruokaaaaaa","Päivällistä","Pöytään","Omnomnomnom"]}];

// Finnish weekdays and months
const W = ["sunnuntai","maanantai","tiistai","keskiviikko","torstai","perjantai","lauantai"];
const M = ["tammikuuta","helmikuuta","maaliskuuta","huhtikuuta","toukokuuta","kesäkuuta",
           "heinäkuuta","elokuuta","syyskuuta","lokakuuta","marraskuuta","joulukuuta"];

function pad(n) { return n.toString().padStart(2, "0"); }
function toDS(d) { return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()); }
function fmtD(d) { return W[d.getDay()] + " " + d.getDate() + ". " + M[d.getMonth()]; }

function getMenu() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const tm = h * 60 + m; // minutes since midnight

  let td, ml, pv = false, sl;

  if (tm >= 1 && tm <= 780) {
    // 00:01–13:00 → today's lunch
    td = toDS(now); ml = "lounas";
    sl = "Tarjoillaan klo 11:00\u201313:00";
  } else if (tm >= 781 && tm <= 960) {
    // 13:01–16:00 → today's dinner
    td = toDS(now); ml = "paivallinen";
    sl = "Tarjoillaan klo 16:00\u201318:00";
  } else {
    // 16:01–00:00 → tomorrow's lunch (preview)
    const t = new Date(now);
    t.setDate(t.getDate() + 1);
    td = toDS(t); ml = "lounas";
    pv = true; sl = "Huomisen lounas";
  }

  const e = MENU_DATA.find(x => x.date === td && x.meal === ml);
  if (!e) return null;

  const dd = new Date(td + "T12:00:00");
  return {
    mealLabel: ml === "lounas" ? "Lounas" : "Päivällinen",
    dateLabel: fmtD(dd),
    rows: e.rows,
    servingLabel: sl,
    isPreview: pv
  };
}

function render() {
  const p = document.getElementById("menuPanel");
  const m = getMenu();

  if (!m) {
    p.innerHTML = '<div class="no-menu">Ruokalistaa ei ole saatavilla tälle päivälle.</div>';
    return;
  }

  const rh = m.rows.map(r => '<div class="menu-row">' + r + '</div>').join("");
  const pb = m.isPreview
    ? '<span class="preview-badge">ennakkotieto</span>'
    : '<div class="serving-time"><span class="dot"></span> Nyt tarjolla</div>';

  p.innerHTML =
    '<div class="menu-header">' +
      '<div class="meal-type">' + m.mealLabel + '</div>' +
      '<div class="menu-date">' + m.dateLabel + '</div>' +
    '</div>' +
    '<div class="menu-rows">' + rh + '</div>' +
    '<div class="time-indicator">' + pb +
      '<span>' + m.servingLabel + '</span>' +
    '</div>';
}

// Initial render + refresh every 60 seconds
render();
setInterval(render, 60000);
</script>
</body>
</html>
