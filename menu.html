<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruokalista</title>
<!--
  3K RUOKALISTA TEMPLATE v4
  =========================
  Power Automate replaces {"settings":{"0":{"aamiainenStart":"7.00","aamiainenEnd":"9.30","lounasStart":"11.00","lounasEnd":"14.00","paivallinenStart":"","paivallinenEnd":""},"1":{"aamiainenStart":"","aamiainenEnd":"","lounasStart":"11.00","lounasEnd":"13.30","paivallinenStart":"16.00","paivallinenEnd":"18.00"},"2":{"aamiainenStart":"7.00","aamiainenEnd":"9.30","lounasStart":"11.00","lounasEnd":"13.30","paivallinenStart":"16.00","paivallinenEnd":"18.00"},"3":{"aamiainenStart":"7.00","aamiainenEnd":"9.30","lounasStart":"11.00","lounasEnd":"13.30","paivallinenStart":"16.00","paivallinenEnd":"18.00"},"4":{"aamiainenStart":"7.00","aamiainenEnd":"9.30","lounasStart":"11.00","lounasEnd":"13.30","paivallinenStart":"16.00","paivallinenEnd":"18.00"},"5":{"aamiainenStart":"7.00","aamiainenEnd":"9.30","lounasStart":"11.00","lounasEnd":"13.30","paivallinenStart":"16.00","paivallinenEnd":"18.00"},"6":{"aamiainenStart":"7.00","aamiainenEnd":"9.30","lounasStart":"11.00","lounasEnd":"14.00","paivallinenStart":"16.00","paivallinenEnd":"18.00"}},"menu":[{"date":"2026-04-14","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Sapuskaa Ruokaa"]},{"date":"2026-04-14","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Jälkiruokaa"]},{"date":"2026-04-15","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa Lisää","Ruokaa Sapuskaa","Sapuskaa Ruokaa","update-test"]},{"date":"2026-04-15","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Ruokaa Sapuskaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Lisää jälkkäriä!"]},{"date":"2026-04-16","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa",""]},{"date":"2026-04-16","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa Torstai","Sapuskaa Ruokaa","Jälkiruokaa"]},{"date":"2026-04-17","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa Perjantai","Sapuskaa Ruokaa",""]},{"date":"2026-04-17","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Sapuskaa Ruokaa"]},{"date":"2026-04-18","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa Lauantai","Sapuskaa Ruokaa",""]},{"date":"2026-04-18","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Sapuskaa Ruokaa"]},{"date":"2026-04-19","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Kermavaahto"]},{"date":"2026-04-19","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Jälkkärii"]},{"date":"2026-04-20","meal":"lounas","rows":["Maanantain","ruokaa","Ruokaaaaaa","okok","Hyvää Ruokaa"]},{"date":"2026-04-20","meal":"paivallinen","rows":["okok","Ruokaaaaaa","Päivällistä","Pöytään","Omnomnomnom"]}]} with JSON data.

  Features:
  - Per-weekday time settings (aamiainen, lounas, päivällinen)
  - Empty times = meal skipped in display rotation
  - Aamiainen shows time only, no menu rows
  - Finnish dot time format (11.00, 13.30)
  - Backward compatible with v1/v2/v3 JSON formats
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=DM+Serif+Display&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-panel:rgba(0,0,0,0.65);
  --text-primary:#FFFFFF;
  --text-secondary:rgba(255,255,255,0.7);
  --accent:#D4A853;
  --accent-dim:rgba(212,168,83,0.3);
  --divider:rgba(255,255,255,0.12);
}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:'DM Sans',sans-serif;color:var(--text-primary)}
.container{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:3% 5%}
.menu-panel{background:var(--bg-panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:16px;padding:5% 7%;width:100%;max-width:800px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.menu-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6%;padding-bottom:4%;border-bottom:2px solid var(--accent-dim)}
.meal-type{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,42px);letter-spacing:0.08em;color:var(--accent)}
.menu-date{font-size:clamp(11px,1.6vw,18px);font-weight:300;color:var(--text-secondary);text-transform:capitalize}
.menu-rows{display:flex;flex-direction:column;gap:clamp(8px,2.2vh,20px)}
.menu-row{font-size:clamp(14px,2.4vw,28px);font-weight:500;line-height:1.35;padding-left:4%;position:relative;letter-spacing:0.01em}
.menu-row::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:5px;height:5px;background:var(--accent);border-radius:50%}
.time-indicator{margin-top:6%;padding-top:4%;border-top:1px solid var(--divider);display:flex;justify-content:space-between;align-items:center;font-size:clamp(9px,1.3vw,14px);color:var(--text-secondary);font-weight:300}
.serving-time{display:flex;align-items:center;gap:6px}
.serving-time .dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;animation:pulse 2s ease-in-out infinite}
.preview-badge{font-style:italic;color:var(--accent);opacity:0.8}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.no-menu{text-align:center;padding:10% 5%;color:var(--text-secondary);font-size:clamp(14px,2vw,22px);font-weight:300;font-style:italic}
.fade-in{animation:fadeIn 0.8s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">
  <div class="menu-panel fade-in" id="menuPanel"></div>
</div>
<script>
var RAW_DATA = {"settings":{"0":{"aamiainenStart":"7.00","aamiainenEnd":"9.30","lounasStart":"11.00","lounasEnd":"14.00","paivallinenStart":"","paivallinenEnd":""},"1":{"aamiainenStart":"","aamiainenEnd":"","lounasStart":"11.00","lounasEnd":"13.30","paivallinenStart":"16.00","paivallinenEnd":"18.00"},"2":{"aamiainenStart":"7.00","aamiainenEnd":"9.30","lounasStart":"11.00","lounasEnd":"13.30","paivallinenStart":"16.00","paivallinenEnd":"18.00"},"3":{"aamiainenStart":"7.00","aamiainenEnd":"9.30","lounasStart":"11.00","lounasEnd":"13.30","paivallinenStart":"16.00","paivallinenEnd":"18.00"},"4":{"aamiainenStart":"7.00","aamiainenEnd":"9.30","lounasStart":"11.00","lounasEnd":"13.30","paivallinenStart":"16.00","paivallinenEnd":"18.00"},"5":{"aamiainenStart":"7.00","aamiainenEnd":"9.30","lounasStart":"11.00","lounasEnd":"13.30","paivallinenStart":"16.00","paivallinenEnd":"18.00"},"6":{"aamiainenStart":"7.00","aamiainenEnd":"9.30","lounasStart":"11.00","lounasEnd":"14.00","paivallinenStart":"16.00","paivallinenEnd":"18.00"}},"menu":[{"date":"2026-04-14","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Sapuskaa Ruokaa"]},{"date":"2026-04-14","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Jälkiruokaa"]},{"date":"2026-04-15","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa Lisää","Ruokaa Sapuskaa","Sapuskaa Ruokaa","update-test"]},{"date":"2026-04-15","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Ruokaa Sapuskaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Lisää jälkkäriä!"]},{"date":"2026-04-16","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa",""]},{"date":"2026-04-16","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa Torstai","Sapuskaa Ruokaa","Jälkiruokaa"]},{"date":"2026-04-17","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa Perjantai","Sapuskaa Ruokaa",""]},{"date":"2026-04-17","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Sapuskaa Ruokaa"]},{"date":"2026-04-18","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa Lauantai","Sapuskaa Ruokaa",""]},{"date":"2026-04-18","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Sapuskaa Ruokaa"]},{"date":"2026-04-19","meal":"lounas","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Kermavaahto"]},{"date":"2026-04-19","meal":"paivallinen","rows":["Ruokaa Sapuskaa","Sapuskaa Ruokaa","Ruokaa Sapuskaa","Sapuskaa Ruokaa","Jälkkärii"]},{"date":"2026-04-20","meal":"lounas","rows":["Maanantain","ruokaa","Ruokaaaaaa","okok","Hyvää Ruokaa"]},{"date":"2026-04-20","meal":"paivallinen","rows":["okok","Ruokaaaaaa","Päivällistä","Pöytään","Omnomnomnom"]}]};

// ── Backward compatibility (v1/v2/v3/v4) ──
var SETTINGS, MENU_DATA;
var defaultTimes = {
  aamiainenStart: "", aamiainenEnd: "",
  lounasStart: "11.00", lounasEnd: "13.00",
  paivallinenStart: "16.00", paivallinenEnd: "18.00"
};

if (Array.isArray(RAW_DATA)) {
  MENU_DATA = RAW_DATA;
  SETTINGS = {};
  for (var i = 0; i < 7; i++) SETTINGS[String(i)] = defaultTimes;
} else {
  MENU_DATA = RAW_DATA.menu;
  if (RAW_DATA.settings && RAW_DATA.settings["0"]) {
    SETTINGS = RAW_DATA.settings;
  } else if (RAW_DATA.settings && RAW_DATA.settings.lounasStart) {
    SETTINGS = {};
    for (var j = 0; j < 7; j++) SETTINGS[String(j)] = RAW_DATA.settings;
  } else {
    SETTINGS = {};
    for (var k = 0; k < 7; k++) SETTINGS[String(k)] = defaultTimes;
  }
}

// Parse "11.00" or "11:00" to minutes since midnight. Returns -1 if empty/invalid.
function parseTime(t) {
  if (!t || t === "") return -1;
  var parts = t.replace(".", ":").split(":");
  if (parts.length < 2) return -1;
  var h = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10);
  if (isNaN(h) || isNaN(m)) return -1;
  return h * 60 + m;
}

// Check if a meal is available (both start and end times are set)
function hasMeal(s, meal) {
  if (meal === "aamiainen") return parseTime(s.aamiainenStart) >= 0 && parseTime(s.aamiainenEnd) >= 0;
  if (meal === "lounas") return parseTime(s.lounasStart) >= 0 && parseTime(s.lounasEnd) >= 0;
  if (meal === "paivallinen") return parseTime(s.paivallinenStart) >= 0 && parseTime(s.paivallinenEnd) >= 0;
  return false;
}

var W = ["sunnuntai","maanantai","tiistai","keskiviikko","torstai","perjantai","lauantai"];
var M = ["tammikuuta","helmikuuta","maaliskuuta","huhtikuuta","toukokuuta","kesäkuuta",
         "heinäkuuta","elokuuta","syyskuuta","lokakuuta","marraskuuta","joulukuuta"];

function pad(n) { return n.toString().padStart(2, "0"); }
function toDS(d) { return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()); }
function fmtD(d) { return W[d.getDay()] + " " + d.getDate() + ". " + M[d.getMonth()]; }

function getMenu() {
  var now = new Date();
  var todayDay = now.getDay();
  var tm = now.getHours() * 60 + now.getMinutes();

  var s = SETTINGS[String(todayDay)] || defaultTimes;

  var aamEnd = parseTime(s.aamiainenEnd);
  var louEnd = parseTime(s.lounasEnd);
  var paiEnd = parseTime(s.paivallinenEnd);

  // ── Determine which meal to show ──
  // Priority order: aamiainen → lounas → päivällinen → tomorrow preview
  // If a meal doesn't exist (empty times), skip to next

  // 1. Aamiainen phase
  if (hasMeal(s, "aamiainen") && tm >= 1 && tm <= aamEnd) {
    return {
      mealLabel: "Aamiainen",
      dateLabel: fmtD(now),
      rows: [],
      servingLabel: "Tarjoillaan klo " + s.aamiainenStart + "\u2013" + s.aamiainenEnd,
      isPreview: false,
      isAamiainen: true
    };
  }

  // 2. Lounas phase (after aamiainen ends, or from start of day if no aamiainen)
  if (hasMeal(s, "lounas") && tm <= louEnd) {
    var e = MENU_DATA.find(function(x) { return x.date === toDS(now) && x.meal === "lounas"; });
    if (e) {
      return {
        mealLabel: "Lounas",
        dateLabel: fmtD(now),
        rows: e.rows.filter(function(r) { return r !== ""; }),
        servingLabel: "Tarjoillaan klo " + s.lounasStart + "\u2013" + s.lounasEnd,
        isPreview: false,
        isAamiainen: false
      };
    }
  }

  // 3. Päivällinen phase
  if (hasMeal(s, "paivallinen") && tm <= paiEnd) {
    var e2 = MENU_DATA.find(function(x) { return x.date === toDS(now) && x.meal === "paivallinen"; });
    if (e2) {
      return {
        mealLabel: "Päivällinen",
        dateLabel: fmtD(now),
        rows: e2.rows.filter(function(r) { return r !== ""; }),
        servingLabel: "Tarjoillaan klo " + s.paivallinenStart + "\u2013" + s.paivallinenEnd,
        isPreview: false,
        isAamiainen: false
      };
    }
  }

  // 4. Tomorrow's lounas preview
  var tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate() + 1);
  var tomorrowDay = tomorrow.getDay();
  var ts = SETTINGS[String(tomorrowDay)] || defaultTimes;

  if (hasMeal(ts, "lounas")) {
    var e3 = MENU_DATA.find(function(x) { return x.date === toDS(tomorrow) && x.meal === "lounas"; });
    if (e3) {
      return {
        mealLabel: "Lounas",
        dateLabel: fmtD(tomorrow),
        rows: e3.rows.filter(function(r) { return r !== ""; }),
        servingLabel: "Huomisen lounas",
        isPreview: true,
        isAamiainen: false
      };
    }
  }

  return null;
}

function render() {
  var p = document.getElementById("menuPanel");
  var m = getMenu();

  if (!m) {
    p.innerHTML = '<div class="no-menu">Ruokalistaa ei ole saatavilla.</div>';
    return;
  }

  // Build menu rows (empty for aamiainen)
  var rh = "";
  if (!m.isAamiainen && m.rows.length > 0) {
    rh = '<div class="menu-rows">' +
      m.rows.map(function(r) { return '<div class="menu-row">' + r + '</div>'; }).join("") +
      '</div>';
  }

  var pb = m.isPreview
    ? '<span class="preview-badge">ennakkotieto</span>'
    : '<div class="serving-time"><span class="dot"></span> Nyt tarjolla</div>';

  p.innerHTML =
    '<div class="menu-header">' +
      '<div class="meal-type">' + m.mealLabel + '</div>' +
      '<div class="menu-date">' + m.dateLabel + '</div>' +
    '</div>' +
    rh +
    '<div class="time-indicator">' + pb +
      '<span>' + m.servingLabel + '</span>' +
    '</div>';
}

render();
setInterval(render, 60000);
</script>
</body>
</html>
